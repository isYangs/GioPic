version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /packages/*
    schedule:
      interval: monthly
    groups:
      app-dependencies:
        dependency-type: production
        patterns:
          - '*'
      dev-dependencies:
        dependency-type: development
        patterns:
          - '*'
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      include: scope
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
    open-pull-requests-limit: 1
