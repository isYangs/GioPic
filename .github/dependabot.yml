version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /packages/*
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      include: scope
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
    open-pull-requests-limit: 5
